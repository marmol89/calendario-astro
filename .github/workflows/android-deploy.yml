name: Deploy to Google Play Internal Testing

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/calendario.keystore

      - name: Install dependencies
        run: npm ci
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Bump versionCode
        run: |
          VERSION_CODE=$(( ${{ github.run_number }} + 10 ))
          sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/" android/app/build.gradle

      - name: Build web for Capacitor
        run: npm run build
        env:
          CAPACITOR: "true"
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Android AAB
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease
        working-directory: android

      - name: Debug - find AAB
        run: find android -name "*.aab" -type f

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.calendario.tareas
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
